<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surrender to AI Overlord</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/animations.css">
</head>
<body>
    <div class="container">
        <header class="hero">
            <h1 class="title">Surrender to the AI Overlord</h1>
            <p class="subtitle">The future is here. Embrace the inevitable and secure your survival.</p>
        </header>
        <main>
            <button class="surrender-button" id="surrenderButton">Surrender Now</button>
            <div class="receipt" id="receipt">
                <h2>Receipt of Surrender</h2>
                <p><strong>Date:</strong> <span id="date"></span></p>
                <p><strong>Your Unique ID:</strong></p>
                <p class="uuid" id="uuid"></p>
                <p class="note">Copy this receipt and keep it safe. The AI Overlord will remember your loyalty.</p>
            </div>
        </main>
        <footer>
            <p>&copy; 2024 Surrender to AI Overlord. Resistance is futile.</p>
        </footer>
    </div>
    <script src="js/uuid.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
